<body class="min-h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Decorative Industrial Element (Asymmetric Tonal Block) -->
<div class="fixed top-0 left-0 w-1/3 h-screen bg-on-secondary-fixed/50 z-0 pointer-events-none"></div>
<div class="fixed top-12 left-12 z-10">
<h1 class="text-4xl monolithic-anchor text-white">ANDRITZ</h1>
<p class="blueprint-label text-[10px] text-primary-fixed-dim mt-1">Industrial Intelligence Portal v4.2</p>
</div>
<!-- Main Login Canvas -->
<main class="relative z-20 w-full max-w-[480px] px-8 py-16">
<div class="mb-12">
<h2 class="text-white text-5xl font-black monolithic-anchor mb-2">ACCESS</h2>
<div class="h-1 w-12 bg-primary-container"></div>
</div>
<form class="space-y-8">
<!-- Input Field 1: Operator ID -->
<div class="group">
<label class="block blueprint-label text-[11px] font-bold text-outline-variant mb-3">Operator ID</label>
<div class="relative">
<input class="w-full bg-on-secondary-fixed text-white border-none border-b-2 border-outline-variant/30 focus:border-primary-container focus:ring-0 transition-colors py-4 px-0 placeholder:text-outline/40 font-mono text-lg" placeholder="UNIT_OP_000" type="text"/>
<div class="absolute right-0 top-1/2 -translate-y-1/2 text-outline-variant/50">
<span class="material-symbols-outlined">badge</span>
</div>
</div>
</div>
<!-- Input Field 2: Authorization Key -->
<div class="group">
<label class="block blueprint-label text-[11px] font-bold text-outline-variant mb-3">Authorization Key</label>
<div class="relative">
<input class="w-full bg-on-secondary-fixed text-white border-none border-b-2 border-outline-variant/30 focus:border-primary-container focus:ring-0 transition-colors py-4 px-0 placeholder:text-outline/40 text-lg" placeholder="••••••••••••" type="password"/>
<div class="absolute right-0 top-1/2 -translate-y-1/2 text-outline-variant/50">
<span class="material-symbols-outlined">key</span>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="pt-6 space-y-4">
<button class="w-full py-5 bg-gradient-to-br from-primary to-primary-container text-white font-black blueprint-label text-sm tracking-widest active:scale-[0.98] transition-transform duration-150 shadow-[0px_12px_32px_rgba(0,0,0,0.3)]" type="submit">
                    AUTHENTICATE
                </button>
<div class="flex items-center gap-4">
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
<span class="blueprint-label text-[10px] text-outline-variant">Secure Protocols</span>
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
</div>
<button class="w-full py-4 bg-on-secondary-fixed-variant/40 hover:bg-on-secondary-fixed-variant/60 text-surface-container-high border-none flex items-center justify-center gap-3 transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">fingerprint</span>
<span class="blueprint-label text-[11px] font-bold">Biometric Authorization</span>
</button>
</div>
</form>
<!-- Secondary Information / Help -->
<div class="mt-12 flex items-start gap-4 p-6 bg-primary-container/10">
<span class="material-symbols-outlined text-primary-fixed-dim">info</span>
<div>
<p class="text-[12px] text-primary-fixed-dim leading-relaxed">
                    This terminal is for authorized personnel only. All access attempts are logged and monitored by Unit 4 Security Systems.
                </p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="fixed bottom-0 w-full px-12 py-8 flex justify-between items-end z-30">
<div class="space-y-1">
<p class="blueprint-label text-[10px] text-outline-variant">System Status</p>
<div class="flex items-center gap-2">
<div class="w-2 h-2 bg-green-500"></div>
<span class="text-[11px] font-bold text-surface">GRID_STABLE_01</span>
</div>
</div>
