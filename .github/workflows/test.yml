name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test dependencies
        run: pip install -e ".[test]"

      - name: Python tests
        run: pytest tests/python -v

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: CLI tests
        run: |
          cd cli && bun install
          bun test tests/cli
