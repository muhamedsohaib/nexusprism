name: Python Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/ui-ux-pro-max/scripts/**'
  pull_request:
    paths:
      - 'src/ui-ux-pro-max/scripts/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run tests
        run: python -m pytest src/ui-ux-pro-max/scripts/tests/ -v
