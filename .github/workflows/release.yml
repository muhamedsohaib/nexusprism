name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # needed to create GitHub releases and upload assets

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Build CLI ────────────────────────────────────────────────────────────
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install CLI dependencies
        working-directory: cli
        run: bun install --frozen-lockfile

      - name: Build CLI
        working-directory: cli
        run: bun run build

      # ── Package release ZIP ──────────────────────────────────────────────────
      - name: Create release ZIP
        run: |
          TAG="${GITHUB_REF_NAME}"
          ZIP_NAME="ui-ux-pro-max-${TAG}.zip"

          # Bundle: repo contents minus git internals, node_modules, and test artefacts
          zip -r "${ZIP_NAME}" . \
            --exclude "*.git*" \
            --exclude "*/node_modules/*" \
            --exclude "*/dist/*" \
            --exclude "*/__pycache__/*" \
            --exclude "*.pyc" \
            --exclude "*/bun.lock"

          echo "ZIP_NAME=${ZIP_NAME}" >> "$GITHUB_ENV"

      # ── Compute checksums ────────────────────────────────────────────────────
      - name: Generate SHA256 checksum
        run: |
          sha256sum "${ZIP_NAME}" > checksums.sha256
          echo "--- Checksum file contents ---"
          cat checksums.sha256

      # ── Create GitHub Release ────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ env.ZIP_NAME }}
            checksums.sha256
