name: Template Guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  platform-template-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync platform templates from source
        run: node cli/scripts/sync-assets.mjs

      - name: Fail on unsynced platform templates
        run: git diff --exit-code -- cli/assets/templates/platforms

      - name: Validate platform templates
        run: node cli/scripts/validate-platform-templates.mjs
