<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 811" width="900" height="811" role="img" aria-label="Nexus Prism logo">
  <defs>
    <linearGradient id="ruby" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff6b78"/>
      <stop offset="0.42" stop-color="#b91c2a"/>
      <stop offset="1" stop-color="#260307"/>
    </linearGradient>
    <linearGradient id="ruby2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff8a94" stop-opacity=".95"/>
      <stop offset=".5" stop-color="#a50f1c"/>
      <stop offset="1" stop-color="#120104"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
