      .dark{fill:#0b0103;fill-opacity:.72;stroke:#ffb6bf;stroke-opacity:.36;stroke-width:5;stroke-linejoin:round}
      .line{fill:none;stroke:#ffe0e4;stroke-opacity:.55;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .crack{fill:none;stroke:#140105;stroke-opacity:.72;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .hot{fill:url(#hot);opacity:.9;mix-blend-mode:screen}
